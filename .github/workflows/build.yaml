name: Build

on:
  workflow_dispatch:
  push:
    tags:
      - "*"

env:
  GODOT_VERSION: 4.5.0
  PRE_RELEASE: False

jobs:
  build:
    name: Building for ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: true
      matrix:
        include:
          - name: 🪟 Windows
            os: windows-latest
            platform: windows
            export-preset: "Windows x86_64"
            export-type: release
            export-folder: build/windows
            archive: Windows
            butler-channel: windows

          - name: 🐧 Linux
            os: ubuntu-22.04
            platform: linux
            export-preset: "Linux x86_64"
            export-type: release
            export-folder: build/linux
            archive: Linux
            butler-channel: linux

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: ${{ env.GODOT_VERSION }}
          use-dotnet: false
          include-templates: true

      - name: Initial Godot Import
        shell: bash
        run: |
          godot --headless --import || exit 0

      - name: Export Godot Project
        shell: bash
        run: >
          godot
          --headless
          ${{ matrix.export-args }}
          --export-${{ matrix.export-type }} "${{ matrix.export-preset }}"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}-Artifacts
          path: |
            ${{ matrix.export-folder }}/*.*
            !**/.gitignore

      - name: Compress Project
        if: >
          github.event_name == 'push' && 
          github.ref_type == 'tag'
        run: |
          cd ${{ matrix.export-folder }}
          7z a -tzip ${{ matrix.archive }}.zip *.* -x'!.gitignore'

      - name: Generate Changelog
        id: changelog
        run: |
          echo "## Changelog" > CHANGELOG.md
          git log $(git describe --tags --abbrev=0)..HEAD --pretty=format:"- %s" >> CHANGELOG.md

      - name: Publish Release
        uses: ncipollo/release-action@v1
        if: >
          github.event_name == 'push' && 
          github.ref_type == 'tag'
        with:
          allowUpdates: true
          artifacts: "${{ matrix.export-folder }}/${{ matrix.archive }}.zip"
          omitNameDuringUpdate: true
          omitBodyDuringUpdate: true
          token: ${{ secrets.GITHUB_TOKEN }}
          prerelease: ${{ env.PRE_RELEASE }}
          body: ${{ steps.changelog.outputs.changelog }}
