name: Build

on:
  workflow_dispatch:
  push:
    tags:
      - "*"

env:
  GODOT_VERSION: 4.5.0
  GAME_NAME: Multiplayer Top-down Shooter
  PRE_RELEASE: false

jobs:
  build:
    name: Building for ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        include:
          - name: 🪟 Windows
            os: windows-latest
            platform: windows
            export-preset: "Windows x86_64"
            export-type: release
            export-folder: build/windows
            archive: windows_x86_64
            butler-channel: windows

          - name: 🐧 Linux
            os: ubuntu-22.04
            platform: linux
            export-preset: "Linux x86_64"
            export-type: release
            export-folder: build/linux
            archive: linux_x86_64
            butler-channel: linux

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: ${{ env.GODOT_VERSION }}
          use-dotnet: false
          include-templates: true

      - name: Initial Godot Import
        shell: bash
        run: |
          godot --headless --import || exit 0

      - name: Export Godot Project
        shell: bash
        run: >
          godot
          --headless
          ${{ matrix.export-args }}
          --export-${{ matrix.export-type }} "${{ matrix.export-preset }}"

      - name: Compress Project
        if: github.event_name == 'push' && github.ref_type == 'tag'
        shell: bash
        run: |
          cd "${{ matrix.export-folder }}"
          7z a -tzip "${{ matrix.archive }}.zip" *.* -x'!.gitignore'

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}-Artifacts
          path: |
            ${{ matrix.export-folder }}/*.*
            !**/.gitignore

  release:
    name: Publish Release
    needs: build
    if: github.event_name == 'push' && github.ref_type == 'tag'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Windows Artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows_x86_64-Artifacts
          path: release/windows_x86_64

      - name: Download Linux Artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux_x86_64-Artifacts
          path: release/linux

      - name: Prepare Release Body
        shell: bash
        env:
          VERSION: ${{ github.ref_name }}
          REPOSITORY: ${{ github.repository }}
        run: |
          VERSION="${VERSION#v}"
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          if [ -n "$PREVIOUS_TAG" ]; then
            CHANGES=$(git log "${PREVIOUS_TAG}..HEAD" --pretty=format:"- %s")
          else
            CHANGES=$(git log --pretty=format:"- %s")
          fi

          if [ -z "$CHANGES" ]; then
            CHANGES="- No commit messages found for this release."
          fi

          cat > release_body.md <<EOF
          ## ${{ env.GAME_NAME }} v${VERSION}

          Built with **Godot:** ${{ env.GODOT_VERSION }}

          ### Installation
          1. Download the ZIP for your platform below.
          2. Extract the archive to a folder of your choice.
          3. Run the game executable inside the extracted folder.

          ### Downloads
          - **Windows:** \`windows_x86_64.zip\`
          - **Linux:** \`linux_x86_64.zip\`

          ### Full Changelog
          https://github.com/${REPOSITORY}/commits/v${VERSION}

          ### Changes in this release
          <details>
          <summary>Click here to see commit messages since the last release</summary>

          ${CHANGES}

          </details>
          EOF

          sed -i 's/^          //' release_body.md

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ env.GAME_NAME }} v${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: ${{ env.PRE_RELEASE }}
          body_path: release_body.md
          files: |
            release/windows_x86_64/windows_x86_64.zip
            release/linux/linux_x86_64.zip
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
